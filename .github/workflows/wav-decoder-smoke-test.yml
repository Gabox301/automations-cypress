name: WAV Decoder Smoke Test

on:
  schedule:
    - cron: '20 0 */3 * *'
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/WAV_Decoder/smoke_test.cy.js
